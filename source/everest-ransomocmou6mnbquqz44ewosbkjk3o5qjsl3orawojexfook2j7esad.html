<script>
(function() {
    var canvas = document.getElementById('rays');
    var ctx    = canvas.getContext('2d');
    var W, H, cx, cy;

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        cx = W / 2;
        cy = H * 0.42;
    }
    resize();
    window.addEventListener('resize', resize);

    var NUM_RAYS = 32;
    var rays = Array.from({ length: NUM_RAYS }, function(_, i) { return {
        angle: -Math.PI / 2 + ((i / NUM_RAYS) - 0.5) * 2.3,
        len:    W * 0.55 + Math.random() * W * 0.2,
        width:  12 + Math.random() * 28,
        speed:  0.00015 + Math.random() * 0.0002,
        phase:  Math.random() * Math.PI * 2,
        alpha:  0.012 + Math.random() * 0.022,
    }; });

    var start = null;

    function draw(ts) {
        if (!start) start = ts;
        var elapsed = ts - start;

        var progress = Math.min(elapsed / 1200, 1);
        var fadeOut  = elapsed > 3800 ? Math.max(0, 1 - (elapsed - 3800) / 800) : 1;
        var global   = progress * fadeOut;

        ctx.clearRect(0, 0, W, H);

        var bloom = ctx.createRadialGradient(cx, cy, 0, cx, cy, H * 0.55);
        bloom.addColorStop(0,    'rgba(120,180,255,' + (0.22 * global) + ')');
        bloom.addColorStop(0.18, 'rgba(82,134,255,'  + (0.10 * global) + ')');
        bloom.addColorStop(0.5,  'rgba(40,80,180,'   + (0.04 * global) + ')');
        bloom.addColorStop(1,    'rgba(6,8,16,0)');
        ctx.beginPath();
        ctx.fillStyle = bloom;
        ctx.arc(cx, cy, H * 0.55, 0, Math.PI * 2);
        ctx.fill();

        rays.forEach(function(ray) {
            var wobble  = Math.sin(elapsed * ray.speed + ray.phase) * 0.018;
            var flicker = 0.7 + 0.3 * Math.sin(elapsed * ray.speed * 3.7 + ray.phase * 2);
            var angle   = ray.angle + wobble;
            var alpha   = ray.alpha * flicker * global;

            var x2 = cx + Math.cos(angle) * ray.len;
            var y2 = cy + Math.sin(angle) * ray.len;

            var g = ctx.createLinearGradient(cx, cy, x2, y2);
            g.addColorStop(0,    'rgba(160,200,255,' + (alpha * 7)   + ')');
            g.addColorStop(0.08, 'rgba(130,175,245,' + (alpha * 4)   + ')');
            g.addColorStop(0.35, 'rgba(82,134,255,'  + (alpha * 1.5) + ')');
            g.addColorStop(1,    'rgba(82,134,255,0)');

            ctx.beginPath();
            ctx.strokeStyle = g;
            ctx.lineWidth   = ray.width;
            ctx.lineCap     = 'round';
            ctx.moveTo(cx, cy);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        });

        var core = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40);
        core.addColorStop(0,   'rgba(220,235,255,' + (0.55 * global) + ')');
        core.addColorStop(0.4, 'rgba(160,200,255,' + (0.20 * global) + ')');
        core.addColorStop(1,   'rgba(82,134,255,0)');
        ctx.beginPath();
        ctx.fillStyle = core;
        ctx.arc(cx, cy, 40, 0, Math.PI * 2);
        ctx.fill();

        if (elapsed < 5400) {
            requestAnimationFrame(draw);
        }
    }
    requestAnimationFrame(draw);
})();
</script>

<script>
    // Глобальная настройка CSRF для всех AJAX-запросов
    $.ajaxSetup({
        headers: { 'X-CSRF-Token': $('meta[name="csrf-token"]').attr('content') }
    });

    var controllersLoader = '<div class="h-100 w-100 flex align-center js-c-center"><div class="spinner-controller"></div></div>';
    $(document).on('click','.menu-item',function () {
        $('.js-controller-view').html(controllersLoader);
        $('.menu-item').removeClass('active');
        $(this).addClass('active');
        updCurrentPage();
    });
    function setLocation(curLoc){
        try {
            history.pushState(null, null, curLoc);
            return;
        } catch(e) {}
        location.hash = '#' + curLoc;
    }
    function updCurrentPage () {
        var currentPage = $('.js-page-get.active').data('page');
        if (currentPage === 'news') {
            $.post('/controllers/news',{},function (resHtml) {
                var translit = $('#translit').val();
                $('.js-controller-view').html(resHtml);
                if (translit !== '') {
                    openChat(translit);
                } else {
                    setLocation('/news');
                }
            });
        } else if (currentPage === 'about') {
            $('#translit').val('');
            $.post('/controllers/about',{},function (resHtml) {
                $('.js-controller-view').html(resHtml);
                setLocation('/about')
            });
        } else if (currentPage === 'complaint') {
            $('#translit').val('');
            $.post('/controllers/complaint',{},function (resHtml) {
                $('.js-controller-view').html(resHtml);
                setLocation('/complaint')
            });
        }
    }
    $(document).on('click','.js-open-chat',function () {
        var translit = $(this).data('translit');
        openChat(translit);
    });
    function showCategoryList() {
        $('.chats-list').removeClass('hidden-mobile');
        $('.chat-data').removeClass('full-width');
        $('.back-btn-mobile').hide();
    }

    function openChat (translit) {
        $('.js-open-chat').removeClass('active');
        $('.js-open-chat[data-translit="'+translit+'"]').addClass('active');
        // #5 — Skeleton loader
        var skeletonHtml = '';
        for (var s = 0; s < 4; s++) {
            skeletonHtml += '<div class="skeleton-block">'
                + '<div class="skeleton-line" style="width:55%"></div>'
                + '<div class="skeleton-line" style="width:80%"></div>'
                + '<div class="skeleton-line" style="width:40%"></div>'
                + '</div>';
        }
        $('.js-chat-container').html(skeletonHtml);
        $.post('/controllers/news_card',{translit:translit},function (resHtml) {
            $('.js-chat-container').html(resHtml);
            setLocation('/news/'+translit+'/');
            updTimers();
            scrollBottomChat();
            // #1 — Волновой fade-in публикаций
            $('.timeline-item').each(function(i) {
                var $el = $(this);
                setTimeout(function() { $el.addClass('anim-in'); }, i * 60);
            });
            // #8 — Tooltip на просмотрах
            tippy('[data-tippy-content]', {
                theme: 'dark', placement: 'top', animation: 'fade'
            });
            // На мобиле: скрыть список категорий, показать чат с кнопкой "Назад"
            if (window.innerWidth <= 768) {
                $('.chats-list').addClass('hidden-mobile');
                $('.chat-data').addClass('full-width');
                $('.back-btn-mobile').show();
            }
        })
    }
    function scrollBottomChat() {
        var chatContainer = $('.js-chat-container');
        var div = chatContainer;
        div.scrollTop(div.prop('scrollHeight'));
    }

    function declensionNum (num, words) {
        return words[(num % 100 > 4 && num % 100 < 20) ? 2 : [2, 0, 1, 1, 1, 2][num % 10 < 5 ? num % 10 : 5]];
    }

    var _timerIds = [];
    function updTimers() {
        _timerIds.forEach(function(id) { clearInterval(id); });
        _timerIds = [];

        $('.js-timer').each(function () {
            var $timer = $(this);
            var datetimeFinish = new Date($timer.data('datetime'));
            var elDays = $timer.find('.timer__days');
            var elHours = $timer.find('.timer__hours');
            var elMinutes = $timer.find('.timer__minutes');
            var elSeconds = $timer.find('.timer__seconds');

            var updateTimer = () => {
                const now = new Date();
                const diff = Math.max(0, datetimeFinish - now);

                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const minutes = Math.floor((diff / (1000 * 60)) % 60);
                const seconds = Math.floor((diff / 1000) % 60);

                elDays.html(String(days).padStart(2, '0'));
                elHours.html(String(hours).padStart(2, '0'));
                elMinutes.html(String(minutes).padStart(2, '0'));
                elSeconds.html(String(seconds).padStart(2, '0'));

                elDays.attr('data-title',declensionNum(days, ['day', 'days', 'days']));
                elHours.attr('data-title',declensionNum(hours, ['hour', 'hours', 'hours']));
                elMinutes.attr('data-title', declensionNum(minutes, ['minute', 'minutes', 'minutes']));
                elSeconds.attr('data-title', declensionNum(seconds, ['second', 'seconds', 'seconds']));

                if (diff === 0) {
                    clearInterval(timerId);
                    var translit = $timer.closest('.timeline-item').data('translit');
                    if (translit) {
                        openChat(translit);
                    }
                }
            };

            updateTimer();
            const timerId = setInterval(updateTimer, 1000);
            _timerIds.push(timerId);
        })
    }

    $(document).on('click','.js-get-password',function () {
        $(this).hide().parents('.timeline-item').find('.js-password-container').show();
    });

    $(document).on('keyup','.js-password-container input',function () {
        if ($(this).val() !== '') {
            $(this).parents('.js-password-container').find('.js-confirm-password').prop('disabled',false);
        } else {
            $(this).parents('.js-password-container').find('.js-confirm-password').prop('disabled',true);
        }
    });

    $(document).on('keyup','.js-password-category input',function () {
        if ($(this).val() !== '') {
            $(this).parents('.js-password-category').find('.js-category-password').prop('disabled',false);
        } else {
            $(this).parents('.js-password-category').find('.js-category-password').prop('disabled',true);
        }
    });
    
    $(document).on('click','.js-confirm-password:not(:disabled)',function () {
        var inputVal = $(this).parents('.js-password-container').find('input');
        var errorArea = $(this).parents('.js-password-container').find('.error-area');
        var password = inputVal.val();
        var timelineItem = $(this).parents('.timeline-item');
        var publicationId = timelineItem.data('publication');
        var translit = timelineItem.data('translit');
        inputVal.removeClass('error');
        errorArea.hide();
        $.post('/controllers/checkPassword',{publicationId:publicationId,passwrod:password},function (res) {
            if (res !== 'ok') {
                inputVal.addClass('error');
                if (res !== '') {
                    errorArea.html(res);
                } else {
                    errorArea.html('Error on the server');
                }
                errorArea.fadeIn();
            } else {
                openChat(translit);
            }
        })
    });

    $(document).on('click','.js-category-password:not(:disabled)',function () {
        var inputVal = $(this).parents('.js-password-category').find('input');
        var errorArea = $(this).parents('.js-password-category').find('.error-area');
        var password = inputVal.val();
        var categoryId = $('#category_id').val();
        inputVal.removeClass('error');
        errorArea.hide();
        $.post('/controllers/checkPasswordCategory',{categoryId:categoryId,password:password},function (res) {
            if (res !== 'ok') {
                inputVal.addClass('error');
                if (res !== '') {
                    errorArea.html(res);
                } else {
                    errorArea.html('Error on the server');
                }
                errorArea.fadeIn();
            } else {
                updCurrentPage();
            }
        })
    })

    // #10 — Parallax фона
    $(window).on('scroll', function() {
        var offset = $(this).scrollTop() * 0.25;
        $('html').css('background-position-y', offset + 'px');
    });

    // #9 — Переключатель тёмная/светлая тема (состояние через [data-theme] на html)
    if (localStorage.getItem('theme') === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
    }
    $('#theme-toggle').on('click', function() {
        var isLight = document.documentElement.getAttribute('data-theme') === 'light';
        var newTheme = isLight ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
    });
</script>

<script>
    $("a.scrollto").on("click", function () {
        let href = $(this).attr("href");

        $("html, body").animate({
            scrollTop: $(href).offset().top
        }, {
            duration: 370,
            easing: "linear"
        });

        return false;
    });
    $('textarea').on('input', function(){
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight +5) + 'px';
    });

    $('textarea').each(function(){
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight +5) + 'px';
    });
    $(function(){
        $(".mask-phone").mask("+7 (999) 999 99-99");
        $(".js-mask-time").mask("99:99");
    });
    document.addEventListener('DOMContentLoaded', function() {
        var modalButtons = document.querySelectorAll('.js-open-modal'),
            overlay      = document.querySelector('.js-overlay-modal'),
            closeButtons = document.querySelectorAll('.js-modal-close');
        modalButtons.forEach(function(item){
            item.addEventListener('click', function(e) {
                e.preventDefault();
                var modalId = this.getAttribute('data-modal'),
                    modalElem = document.querySelector('.modal[data-modal="' + modalId + '"]');
                modalElem.classList.add('active');
                overlay.classList.add('active');
            });
        });
        closeButtons.forEach(function(item){
            item.addEventListener('click', function(e) {
                var parentModal = this.closest('.modal');

                parentModal.classList.remove('active');
                overlay.classList.remove('active');
            });
        });
        document.body.addEventListener('keyup', function (e) {
            var key = e.keyCode;

            if (key == 27) {

                document.querySelector('.modal.active').classList.remove('active');
                document.querySelector('.overlay').classList.remove('active');
            };
        }, false);
        overlay.addEventListener('click', function() {
            document.querySelector('.modal.active').classList.remove('active');
            this.classList.remove('active');
        });
    });
</script>


<script>
    $(document).on('keydown', 'input.js-input-money', function(e){

        if(this.selectionStart || this.selectionStart == 0){
            // selectionStart won't work in IE < 9

            var key = e.which;
            var prevDefault = true;

            var thouSep = " ";  // your seperator for thousands
            var deciSep = ",";  // your seperator for decimals
            var deciNumber = 2; // how many numbers after the comma

            var thouReg = new RegExp(thouSep,"g");
            var deciReg = new RegExp(deciSep,"g");

            function spaceCaretPos(val, cPos){
                /// get the right caret position without the spaces

                if(cPos > 0 && val.substring((cPos-1),cPos) == thouSep)
                    cPos = cPos-1;

                if(val.substring(0,cPos).indexOf(thouSep) >= 0){
                    cPos = cPos - val.substring(0,cPos).match(thouReg).length;
                }

                return cPos;
            }

            function spaceFormat(val, pos){
                /// add spaces for thousands

                if(val.indexOf(deciSep) >= 0){
                    var comPos = val.indexOf(deciSep);
                    var int = val.substring(0,comPos);
                    var dec = val.substring(comPos);
                } else{
                    var int = val;
                    var dec = "";
                }
                var ret = [val, pos];

                if(int.length > 3){

                    var newInt = "";
                    var spaceIndex = int.length;

                    while(spaceIndex > 3){
                        spaceIndex = spaceIndex - 3;
                        newInt = thouSep+int.substring(spaceIndex,spaceIndex+3)+newInt;
                        if(pos > spaceIndex) pos++;
                    }
                    ret = [int.substring(0,spaceIndex) + newInt + dec, pos];
                }
                return ret;
            }

            $(this).on('keyup', function(ev){

                if(ev.which == 8){
                    // reformat the thousands after backspace keyup

                    var value = this.value;
                    var caretPos = this.selectionStart;

                    caretPos = spaceCaretPos(value, caretPos);
                    value = value.replace(thouReg, '');

                    var newValues = spaceFormat(value, caretPos);
                    this.value = newValues[0];
                    this.selectionStart = newValues[1];
                    this.selectionEnd   = newValues[1];
                }
            });

            if((e.ctrlKey && (key == 65 || key == 67 || key == 86 || key == 88 || key == 89 || key == 90)) ||
                (e.shiftKey && key == 9)) // You don't want to disable your shortcuts!
                prevDefault = false;

            if((key < 37 || key > 40) && key != 8 && key != 9 && prevDefault){
                e.preventDefault();

                if(!e.altKey && !e.shiftKey && !e.ctrlKey){

                    var value = this.value;
                    if((key > 95 && key < 106)||(key > 47 && key < 58) ||
                        (deciNumber > 0 && (key == 110 || key == 188 || key == 190))){

                        var keys = { // reformat the keyCode
                            48: 0, 49: 1, 50: 2, 51: 3,  52: 4,  53: 5,  54: 6,  55: 7,  56: 8,  57: 9,
                            96: 0, 97: 1, 98: 2, 99: 3, 100: 4, 101: 5, 102: 6, 103: 7, 104: 8, 105: 9,
                            110: deciSep, 188: deciSep, 190: deciSep
                        };

                        var caretPos = this.selectionStart;
                        var caretEnd = this.selectionEnd;

                        if(caretPos != caretEnd) // remove selected text
                            value = value.substring(0,caretPos) + value.substring(caretEnd);

                        caretPos = spaceCaretPos(value, caretPos);

                        value = value.replace(thouReg, '');

                        var before = value.substring(0,caretPos);
                        var after = value.substring(caretPos);
                        var newPos = caretPos+1;

                        if(keys[key] == deciSep && value.indexOf(deciSep) >= 0){
                            if(before.indexOf(deciSep) >= 0){ newPos--; }
                            before = before.replace(deciReg, '');
                            after = after.replace(deciReg, '');
                        }
                        var newValue = before + keys[key] + after;

                        if(newValue.substring(0,1) == deciSep){
                            newValue = "0"+newValue;
                            newPos++;
                        }

                        while(newValue.length > 1 &&
                        newValue.substring(0,1) == "0" && newValue.substring(1,2) != deciSep){
                            newValue = newValue.substring(1);
                            newPos--;
                        }

                        if(newValue.indexOf(deciSep) >= 0){
                            var newLength = newValue.indexOf(deciSep)+deciNumber+1;
                            if(newValue.length > newLength){
                                newValue = newValue.substring(0,newLength);
                            }
                        }

                        newValues = spaceFormat(newValue, newPos);

                        this.value = newValues[0];
                        this.selectionStart = newValues[1];
                        this.selectionEnd   = newValues[1];
                    }
                }
            }

            $(this).on('blur', function(e){

                if(deciNumber > 0){
                    var value = this.value;

                    var noDec = "";
                    for(var i = 0; i < deciNumber; i++)
                        noDec += "0";

                    if(value == "0"+deciSep+noDec)
                        this.value = ""; //<-- put your default value here
                    else
                    if(value.length > 0){
                        if(value.indexOf(deciSep) >= 0){
                            var newLength = value.indexOf(deciSep)+deciNumber+1;
                            if(value.length < newLength){
                                while(value.length < newLength){ value = value+"0"; }
                                this.value = value.substring(0,newLength);
                            }
                        }
                        else this.value = value + deciSep + noDec;
                    }
                }
            });
        }
    });
</script>
